<!DOCTYPE html>
<html>
<head>
  <title>GoobleGames</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
    }
    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 18px;
    }
    canvas {
      display: block;
      margin: auto;
      background: #222;
    }
  </style>
</head>
<body>

<div id="status">Starting...</div>
<canvas id="c" width="800" height="500"></canvas>

<script>
// 🔥 STEP 1: PROVE JS IS RUNNING
alert("JS is running ✅");

console.log("Script loaded");

// 🔥 STEP 2: SETUP
const statusDiv = document.getElementById("status");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// 🔥 IMPORTANT: YOUR SERVER URL
const ws = new WebSocket("wss://gooblegames-1.onrender.com/ws");

let id = null;
let players = {};
let me = { x: 100, y: 100 };

// 🔌 CONNECTION STATUS
ws.onopen = () => {
  console.log("CONNECTED");
  statusDiv.textContent = "CONNECTED ✅";
};

ws.onerror = (e) => {
  console.log("ERROR", e);
  statusDiv.textContent = "ERROR ❌";
};

ws.onclose = () => {
  console.log("CLOSED");
  statusDiv.textContent = "CLOSED ⚠️";
};

// 🧠 RECEIVE DATA
ws.onmessage = (msg) => {
  console.log("Message received");

  const data = JSON.parse(msg.data);

  if (data.type === "init") {
    id = data.id;
    players = data.players;
  }

  if (data.type === "update") {
    players = data.players;
  }
};

// 🎮 MOVEMENT
document.addEventListener("keydown", (e) => {
  if (!id) return;

  if (e.key === "w") me.y -= 5;
  if (e.key === "s") me.y += 5;
  if (e.key === "a") me.x -= 5;
  if (e.key === "d") me.x += 5;

  ws.send(JSON.stringify({
    type: "move",
    pos: me
  }));
});

// 🖼️ DRAW LOOP
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let p in players) {
    ctx.fillStyle = (p === id) ? "lime" : "cyan";
    ctx.fillRect(players[p].x, players[p].y, 20, 20);
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
