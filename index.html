<!DOCTYPE html>
<html>
<head>
  <title>Cozy Winter Chill</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(#0b1d2a, #1e3a4c);
      overflow: hidden;
      font-family: Arial;
      color: white;
    }
    #text {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 18px;
      opacity: 0.8;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="text">WASD to walk • Click to sip hot chocolate ☕</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🧍 player
let player = { x: canvas.width/2, y: canvas.height/2 };

// ❄️ snow
let snow = [];
for (let i = 0; i < 150; i++) {
  snow.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    speed: Math.random() * 1 + 0.5
  });
}

// ☕ sip effect
let sip = 0;

document.addEventListener("keydown", (e) => {
  if (e.key === "w") player.y -= 2;
  if (e.key === "s") player.y += 2;
  if (e.key === "a") player.x -= 2;
  if (e.key === "d") player.x += 2;
});

document.addEventListener("click", () => {
  sip = 1; // trigger cozy glow
});

function draw() {
  // 🌌 background fade
  ctx.fillStyle = "rgba(11,29,42,0.3)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ❄️ snow
  ctx.fillStyle = "white";
  for (let s of snow) {
    ctx.fillRect(s.x, s.y, 2, 2);
    s.y += s.speed;

    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }
  }

  // 🧍 player (little warm light)
  ctx.beginPath();
  ctx.arc(player.x, player.y, 10, 0, Math.PI * 2);
  ctx.fillStyle = "#ffd27f";
  ctx.fill();

  // 🔥 cozy glow when sipping
  if (sip > 0) {
    ctx.beginPath();
    ctx.arc(player.x, player.y, 40, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,180,100,0.2)";
    ctx.fill();
    sip -= 0.01;
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
